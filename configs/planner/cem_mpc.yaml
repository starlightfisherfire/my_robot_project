version: "0.1"

planner:
  name: "cem_mpc"
  description: >
    Fixed CEM-MPC executor for Paper 1. This planner is shared by all compared
    high-level representations. The main comparison should come from the
    high-level representation, not from changing the executor.

cem:
  horizon: 10
  num_candidates: 512
  num_elites: 64
  num_iterations: 5
  replan_every: 1
  action_noise_std: 0.01
  elite_fraction: 0.125

action:
  type: "planar_push_delta"
  dim: 2
  description: >
    Each action represents a planar end-effector displacement command in the
    workspace frame. This is a first-version abstraction for single-arm pushing.
  max_delta_xy: 0.02
  min_delta_xy: -0.02
  action_repeat: 1

rollout:
  model_source: "high_level_model"
  use_dynamics_head: true
  use_subgoal_head: true
  use_affordance_head: false
  description: >
    CEM-MPC uses the same rollout interface for all high-level representations.
    The rollout model may use predicted object dynamics and/or subgoal estimates,
    but the planner search procedure remains fixed.

cost:
  config: "configs/planner/cost_weights.yaml"
  terms:
    goal_position_error: true
    goal_rotation_error: true
    collision_penalty: true
    out_of_bounds_penalty: true
    action_smoothness: true
    contact_affordance_penalty: false

constraints:
  workspace:
    x_min: -0.30
    x_max: 0.30
    y_min: -0.30
    y_max: 0.30

  object_pose:
    max_translation_error_for_success: 0.02
    max_rotation_error_deg_for_success: 10.0

  safety:
    reject_out_of_bounds_rollouts: true
    reject_invalid_collisions: true

randomness:
  seed: 42
  deterministic_eval: true

evaluation:
  success_position_threshold: 0.02
  success_rotation_threshold_deg: 10.0
  max_episode_steps: 100
  record_video: true
  save_per_episode_rollouts: false

notes:
  - "All methods must use this same CEM-MPC config unless explicitly reported as an ablation."
  - "Planner hyperparameters should not be tuned separately for different high-level representations."
  - "If this config changes, the run must snapshot the exact config into runs/<run_id>/config_snapshot/."
