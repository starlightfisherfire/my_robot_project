version: "0.1"

ood_axes:
  layout_id:
    - "open_space"
    - "mild_offset"

  layout_ood:
    - "blocking"
    - "narrow_passage"
    - "edge_goal"

  shape_id:
    - "T"

  shape_ood:
    - "L"

splits:
  train_sim_id:
    source: "sim"
    role: "train"
    object_shapes: ["T"]
    layout_families: ["open_space", "mild_offset"]

  val_sim_id:
    source: "sim"
    role: "validation"
    object_shapes: ["T"]
    layout_families: ["open_space", "mild_offset"]

  test_sim_id:
    source: "sim"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["open_space", "mild_offset"]

  test_sim_layout_ood_blocking:
    source: "sim"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["blocking"]
    held_out_factor: "layout"

  test_sim_layout_ood_narrow_passage:
    source: "sim"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["narrow_passage"]
    held_out_factor: "layout"

  test_sim_layout_ood_edge_goal:
    source: "sim"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["edge_goal"]
    held_out_factor: "layout"

  test_sim_shape_ood_L:
    source: "sim"
    role: "test"
    object_shapes: ["L"]
    layout_families: ["open_space", "mild_offset", "blocking"]
    held_out_factor: "shape"

  calibrate_real_id:
    source: "real"
    role: "calibration"
    object_shapes: ["T"]
    layout_families: ["open_space"]

  adapt_real_id:
    source: "real"
    role: "adaptation"
    object_shapes: ["T"]
    layout_families: ["open_space", "mild_offset"]

  val_real_id:
    source: "real"
    role: "validation"
    object_shapes: ["T"]
    layout_families: ["open_space", "mild_offset"]

  test_real_id:
    source: "real"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["open_space", "mild_offset"]

  test_real_layout_ood_blocking:
    source: "real"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["blocking"]
    held_out_factor: "layout"

  test_real_layout_ood_narrow_passage:
    source: "real"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["narrow_passage"]
    held_out_factor: "layout"

  test_real_layout_ood_edge_goal:
    source: "real"
    role: "test"
    object_shapes: ["T"]
    layout_families: ["edge_goal"]
    held_out_factor: "layout"

  test_real_shape_ood_L:
    source: "real"
    role: "test"
    object_shapes: ["L"]
    layout_families: ["open_space", "mild_offset", "blocking"]
    held_out_factor: "shape"

protocols:
  sim_mechanism:
    train: "train_sim_id"
    validation: "val_sim_id"
    test_id: "test_sim_id"
    test_ood:
      - "test_sim_layout_ood_blocking"
      - "test_sim_layout_ood_narrow_passage"
      - "test_sim_layout_ood_edge_goal"
      - "test_sim_shape_ood_L"

  real_zero_shot_transfer:
    train: "train_sim_id"
    adaptation: null
    test_id: "test_real_id"
    test_ood:
      - "test_real_layout_ood_blocking"
      - "test_real_layout_ood_narrow_passage"
      - "test_real_layout_ood_edge_goal"
      - "test_real_shape_ood_L"

  real_id_adapted_transfer:
    train: "train_sim_id"
    adaptation: "adapt_real_id"
    validation: "val_real_id"
    test_id: "test_real_id"
    test_ood:
      - "test_real_layout_ood_blocking"
      - "test_real_layout_ood_narrow_passage"
      - "test_real_layout_ood_edge_goal"
      - "test_real_shape_ood_L"
